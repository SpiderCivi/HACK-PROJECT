<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img">
<defs>
<radialGradient id="glow" cx="50%" cy="50%"><stop offset="0%" stop-color="#ea580c" stop-opacity=".22"/><stop offset="100%" stop-color="#ea580c" stop-opacity="0"/></radialGradient>
<filter id="grain"><feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="4"/></filter>
<pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0v48" fill="none" stroke="#1b1b20" stroke-width="1"/></pattern>
</defs>
<style>
@media (prefers-reduced-motion: reduce) { * { animation: none !important; } }

.k{opacity:1;animation:kp 4.5s infinite} .k1{animation-delay:.5s} .k2{animation-delay:1.2s} .k3{animation-delay:1.9s}
@keyframes kp{0%,8%{opacity:.28;transform:translateY(5px)}16%,34%{opacity:1;transform:none}46%,100%{opacity:.5;transform:none}}
.cur{animation:blink 1s steps(1) infinite} @keyframes blink{50%{opacity:0}}
.box{animation:pulse 4.5s infinite} @keyframes pulse{0%,60%{stroke:#6b665c}70%,100%{stroke:#ea580c}}

</style>
<rect width="1200" height="675" fill="#0a0a0b"/>
<rect width="1200" height="675" fill="url(#grid)"/>
<ellipse cx="600.0" cy="337.5" rx="576.0" ry="371.25000000000006" fill="url(#glow)"/>

<g transform="translate(310,180)">
  <rect class="box" width="580" height="315" rx="4" fill="#101014" stroke="#6b665c" stroke-width="1.5"/>
  <rect x="28" y="30" width="26" height="26" rx="3" fill="none" stroke="#6b665c" stroke-width="2"/>
  <path d="M34 43l6 6 12-14" fill="none" stroke="#ea580c" stroke-width="2.5" stroke-linecap="round"/>
  <text x="72" y="50" font-family="monospace" font-size="17" fill="#e9e5db">Non sono un robot</text>
  <line x1="28" y1="82" x2="552" y2="82" stroke="#22222a"/>
  <g font-family="monospace" font-size="20" fill="#fdba74">
    <g class="k k1"><rect x="28" y="108" width="172" height="44" rx="4" fill="#17171d" stroke="#ea580c" stroke-width="1"/><text x="46" y="137">Windows + R</text></g>
    <g class="k k2"><rect x="28" y="168" width="172" height="44" rx="4" fill="#17171d" stroke="#ea580c" stroke-width="1"/><text x="62" y="197">CTRL + V</text></g>
    <g class="k k3"><rect x="28" y="228" width="172" height="44" rx="4" fill="#17171d" stroke="#ea580c" stroke-width="1"/><text x="70" y="257">Invio</text></g>
  </g>
  <text x="228" y="140" font-family="monospace" font-size="15" fill="#6b665c">clipboard:</text>
  <text x="228" y="168" font-family="monospace" font-size="13" fill="#ea580c">powershell -enc SQBFAFgA...</text>
  <rect class="cur" x="474" y="155" width="8" height="16" fill="#ea580c"/>
</g>
<rect width="1200" height="675" filter="url(#grain)" opacity=".05"/>
</svg>