<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img"><defs><radialGradient id="glow" cx="50%" cy="50%"><stop offset="0%" stop-color="#dc2626" stop-opacity=".22"/><stop offset="100%" stop-color="#dc2626" stop-opacity="0"/></radialGradient><filter id="grain"><feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="4"/></filter><pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0v48" fill="none" stroke="#1b1b20" stroke-width="1"/></pattern></defs><style>@media (prefers-reduced-motion: reduce) { * { animation: none !important; } }.pk{animation:fw 3.4s linear infinite}@keyframes fw{0%{offset-distance:0%;opacity:0}12%{opacity:1}88%{opacity:1}100%{offset-distance:100%;opacity:0}}.tn{animation:tn 3.4s ease-in-out infinite}@keyframes tn{0%,25%{opacity:.25}45%,75%{opacity:1}100%{opacity:.25}}.vt{animation:vt 3.4s ease-in-out infinite}@keyframes vt{0%,60%{opacity:.35}78%,100%{opacity:1}}</style><rect width="1200" height="675" fill="#0a0a0b"/><rect width="1200" height="675" fill="url(#grid)"/><ellipse cx="600" cy="337" rx="576" ry="371" fill="url(#glow)"/><g font-family="monospace"><text x="90" y="212" font-size="13" fill="#6b665c">SonicWall SMA1000 — remote access</text><rect x="90" y="252" width="250" height="150" rx="4" fill="#101014" stroke="#6b665c"/><text x="112" y="286" font-size="13" fill="#e9e5db">SMA1000 · WorkPlace :443</text><text x="112" y="330" font-size="20" fill="#dc2626">/wsproxy</text><text x="112" y="360" font-size="12" fill="#6b665c">SSRF · no auth</text><g class="tn"><path d="M340,320 L560,320" stroke="#dc2626" stroke-width="1.6" stroke-dasharray="6 6"/><text x="392" y="308" font-size="11" fill="#dc2626">tunnel -&gt; localhost</text></g><circle class="pk" r="5" fill="#fca5a5" style="offset-path:path('M340,320 L560,320')"/><rect x="560" y="252" width="252" height="170" rx="4" fill="#101014" stroke="#6b665c"/><text x="582" y="286" font-size="13" fill="#e9e5db">localhost</text><text x="582" y="322" font-size="12" fill="#6b665c">Erlang :1050 — hardcoded cookie</text><text x="582" y="348" font-size="12" fill="#6b665c">ctrl-service :8188</text><text x="582" y="392" font-size="15" fill="#dc2626">-&gt; root</text><path d="M812,340 L830,340" stroke="#dc2626" stroke-width="1.5"/><path d="M824,334 l8,6 l-8,6" fill="none" stroke="#dc2626" stroke-width="1.5"/><rect class="vt" x="830" y="252" width="280" height="170" rx="4" fill="#17171d" stroke="#dc2626" stroke-width="1.5"/><text x="852" y="292" font-size="14" fill="#dc2626">TOTP SEEDS + SESSION DB</text><text x="852" y="322" font-size="12" fill="#6b665c">what a reset won't rotate</text><text x="852" y="372" font-size="11" fill="#6b665c">TOTP · sessioni · LDAP</text><text x="90" y="560" font-size="12" fill="#6b665c">the patch shuts the door. Not what they carried out with them.</text></g><rect width="1200" height="675" filter="url(#grain)" opacity=".05"/></svg>