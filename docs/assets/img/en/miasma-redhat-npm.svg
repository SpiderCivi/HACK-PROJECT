<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img"><defs><radialGradient id="glow" cx="50%" cy="50%"><stop offset="0%" stop-color="#ea580c" stop-opacity=".22"/><stop offset="100%" stop-color="#ea580c" stop-opacity="0"/></radialGradient><filter id="grain"><feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="4"/></filter><pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0v48" fill="none" stroke="#1b1b20" stroke-width="1"/></pattern></defs><style>@media (prefers-reduced-motion: reduce) { * { animation: none !important; } }.warn{opacity:1;animation:wn 4s ease-in-out infinite}@keyframes wn{0%,45%{opacity:.35}60%,100%{opacity:1}}</style><rect width="1200" height="675" fill="#0a0a0b"/><rect width="1200" height="675" fill="url(#grid)"/><ellipse cx="600" cy="337" rx="576" ry="371" fill="url(#glow)"/><g font-family="monospace" font-size="13"><rect x="140" y="240" width="300" height="170" rx="4" fill="#101014" stroke="#ea580c" stroke-width="1.5"/><text x="164" y="276" fill="#ea580c">@redhat-cloud-services</text><text x="164" y="304" fill="#6b665c" font-size="11">preinstall: eval(ROT(...))</text><text x="164" y="330" fill="#6b665c" font-size="11">harvests GCP / Azure / CI</text><text x="164" y="384" fill="#ea580c" font-size="11">32 packages · 90+ versions</text><circle cx="560" cy="325" r="52" fill="none" stroke="#4d7c0f" stroke-width="2"/><path d="M536 325l16 16 30-34" fill="none" stroke="#4d7c0f" stroke-width="3" stroke-linecap="round"/><text x="508" y="410" fill="#4d7c0f" font-size="11">SLSA valid</text><rect x="680" y="252" width="370" height="146" rx="4" fill="#0d0d11" stroke="#6b665c"/><text x="704" y="286" fill="#e9e5db" font-size="12">provenance != integrity</text><text x="704" y="318" fill="#6b665c" font-size="11">certifies WHERE it was</text><text x="704" y="338" fill="#6b665c" font-size="11">built, not WHETHER the</text><text x="704" y="358" fill="#6b665c" font-size="11">input was legitimate</text><g class="warn"><text x="704" y="384" fill="#ea580c" font-size="11">-> green tick on malware</text></g></g><rect width="1200" height="675" filter="url(#grain)" opacity=".05"/></svg>