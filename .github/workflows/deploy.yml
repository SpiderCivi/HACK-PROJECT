name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Genera il sito
        run: python scripts/build.py

      - name: Verifica anti-leak
        run: |
          if grep -rlE 'github_pat_[A-Za-z0-9_]{20}|ghp_[A-Za-z0-9]{30}|sk_[a-f0-9]{40}' site/; then
            echo "::error::Segreto rilevato nell'output generato — deploy annullato"
            exit 1
          fi
          echo "Nessun segreto nell'output."

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
